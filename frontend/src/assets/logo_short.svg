<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sun -->
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF176"></stop>
      <stop offset="70%" stop-color="#FFD54F"></stop>
      <stop offset="100%" stop-color="#FF9800"></stop>
    </radialGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Light -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF59D" stop-opacity="0.8"></stop>
      <stop offset="100%" stop-color="#FFF59D" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"></feGaussianBlur>
    </filter>
  </defs>

  <!-- SUN -->
  <circle cx="70" cy="30" r="22" fill="url(#sunGlow)" filter="url(#blur)"></circle>
  <circle cx="70" cy="30" r="14" fill="url(#sunCore)"></circle>

  <!-- LIGHT -->
  <polygon points="64,42 74,42 88,62 52,62" fill="url(#beamGrad)" opacity="0.8"></polygon>

  <!-- TEXT -->
  <text x="70" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1565C0">
    Volt
  </text>
</svg>