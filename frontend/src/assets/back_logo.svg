<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- BACKGROUND -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F"></stop>
      <stop offset="50%" stop-color="#0D47A1"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <!-- SUN -->
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF59D"></stop>
      <stop offset="60%" stop-color="#FFD54F"></stop>
      <stop offset="100%" stop-color="#FF9800"></stop>
    </radialGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"></stop>
    </radialGradient>

    <!-- ENERGY FLOW -->
    <linearGradient id="energyFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF59D" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"></stop>
    </linearGradient>

    <!-- PANEL -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"></stop>
      <stop offset="100%" stop-color="#1976D2"></stop>
    </linearGradient>

    <!-- GLOSS -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    <!-- GRID -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0 L0 0 0 80" fill="none" stroke="#1E3A5F" stroke-width="1"></path>
    </pattern>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"></feGaussianBlur>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"></rect>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.12"></rect>

  <!-- SUN (TOP LEFT) -->
  <circle cx="250" cy="200" r="180" fill="url(#sunGlow)" filter="url(#blur)"></circle>
  <circle cx="250" cy="200" r="90" fill="url(#sunCore)"></circle>

  <!-- ENERGY FLOW -->
  <path d="M300 250 C800 300, 1200 700, 1500 820" stroke="url(#energyFlow)" stroke-width="6" fill="none" opacity="0.6"></path>

  <path d="M320 300 C900 350, 1300 750, 1600 880" stroke="url(#energyFlow)" stroke-width="3" fill="none" opacity="0.4"></path>

  <!-- SOLAR PANEL (BOTTOM RIGHT, TILTED) -->
  <g transform="rotate(-18 1600 850)">
    <!-- panel -->
    <rect x="1500" y="780" width="220" height="120" rx="12" fill="url(#panelGrad)"></rect>

    <!-- grid -->
    <g stroke="#90CAF9" stroke-width="1">
      <line x1="1540" y1="780" x2="1540" y2="900"></line>
      <line x1="1580" y1="780" x2="1580" y2="900"></line>
      <line x1="1620" y1="780" x2="1620" y2="900"></line>
      <line x1="1660" y1="780" x2="1660" y2="900"></line>

      <line x1="1500" y1="820" x2="1720" y2="820"></line>
      <line x1="1500" y1="860" x2="1720" y2="860"></line>
    </g>

    <!-- gloss -->
    <rect x="1500" y="780" width="220" height="50" rx="12" fill="url(#gloss)"></rect>
  </g>

  <!-- CENTER FADE -->
  <radialGradient id="centerFade" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"></stop>
    <stop offset="100%" stop-color="#000" stop-opacity="0.4"></stop>
  </radialGradient>

  <rect width="1920" height="1080" fill="url(#centerFade)"></rect>

  <!-- WATERMARK -->
  <text x="40" y="1040" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" opacity="0.08">
    VoltHome
  </text>
</svg>